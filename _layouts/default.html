<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <div class="site-wrapper">
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="nav-logo">
        <span class="prompt">$</span>rubberduck.log<span class="cursor"></span>
      </a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">~/articles</a></li>
        <li><a href="{{ '/a-propos' | relative_url }}">~/about</a></li>
        <li><a href="https://github.com/RubberDucking35" target="_blank" rel="noopener">~/github</a></li>
      </ul>
    </nav>

    {{ content }}

    <footer class="site-footer">
      <span>RubberDucking35 · Bretagne · {{ site.time | date: "%Y" }}</span>
      <div class="footer-links">
        <a href="https://github.com/RubberDucking35" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </footer>
  </div>
</body>
</html>
