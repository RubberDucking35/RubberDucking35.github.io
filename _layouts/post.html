---
layout: default
---

<a href="{{ '/' | relative_url }}" class="back-link">Retour aux articles</a>

<header class="post-header">
  <div class="post-header-meta">
    <span>{{ page.date | date: "%d %b %Y" }}</span>
    {% if page.tags %}
      <span class="sep">/</span>
      {% for tag in page.tags %}
        <span>#{{ tag }}</span>
      {% endfor %}
    {% endif %}
  </div>
  <h1>{{ page.title }}</h1>
</header>

<article class="post-content">
  {{ content }}
</article>
